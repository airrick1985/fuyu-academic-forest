<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外觀3D - 富宇學森 The Academic Forest</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/exterior-3d.css">
</head>

<body class="pano-page">

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- 全螢幕圖片輪播 -->
    <div class="ext3d-viewer" id="ext3dViewer">

        <!-- 幻燈片 -->
        <div class="ext3d-slide active" data-index="0">
            <img src="assets/images/3D-01.jpg" alt="富宇學森 外觀3D渲染圖 - 全景" draggable="false">
        </div>
        <div class="ext3d-slide" data-index="1">
            <img src="assets/images/3D-02.jpg" alt="富宇學森 外觀3D渲染圖 - 入口特寫" draggable="false">
        </div>

        <!-- 左右箭頭 -->
        <button class="ext3d-arrow ext3d-arrow-prev" id="prevBtn" title="上一張">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="ext3d-arrow ext3d-arrow-next" id="nextBtn" title="下一張">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>

        <!-- 底部指標列 -->
        <div class="ext3d-bottom-bar">
            <div class="ext3d-dots" id="ext3dDots"></div>
        </div>

        <!-- 頁面標題 -->
        <div class="ext3d-title-overlay">
            <h2>外觀3D</h2>
            <p>EXTERIOR 3D RENDERING</p>
        </div>

        <!-- 計數器 -->
        <div class="ext3d-counter" id="ext3dCounter">1 / 2</div>

        <!-- 3D渲染圖免責聲明 -->
        <div class="ext3d-disclaimer">※ 此為3D渲染示意圖，僅供參考，與實際成屋外觀可能會有差異</div>

        <!-- 操作提示 -->
        <div class="ext3d-hint">
            <span>🖱️</span>
            <span>滾輪縮放 · 拖曳移動 · 左右鍵切換</span>
        </div>

    </div>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script>
        (() => {
            const viewer = document.getElementById('ext3dViewer');
            const slides = viewer.querySelectorAll('.ext3d-slide');
            const dotsContainer = document.getElementById('ext3dDots');
            const counter = document.getElementById('ext3dCounter');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const totalSlides = slides.length;

            let currentIndex = 0;

            // ===== 建立圓點指標 =====
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'ext3d-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            });

            function goToSlide(index) {
                // 切換幻燈片前，重設目前幻燈片的縮放與位移
                resetSlideTransform(currentIndex);

                slides[currentIndex].classList.remove('active');
                dotsContainer.children[currentIndex].classList.remove('active');

                currentIndex = (index + totalSlides) % totalSlides;

                slides[currentIndex].classList.add('active');
                dotsContainer.children[currentIndex].classList.add('active');
                counter.textContent = `${currentIndex + 1} / ${totalSlides}`;

                // 重設新幻燈片的縮放狀態
                resetSlideTransform(currentIndex);
            }

            prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
            nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

            // ===== 鍵盤左右鍵 =====
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
                if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
            });

            // ===== 每張幻燈片的獨立縮放/拖曳狀態 =====
            const slideStates = Array.from(slides).map(() => ({
                scale: 1, translateX: 0, translateY: 0
            }));
            const MIN_SCALE = 1;
            const MAX_SCALE = 8;

            let isDragging = false;
            let startX = 0, startY = 0;

            function updateSlideTransform(index) {
                const s = slideStates[index];
                const img = slides[index].querySelector('img');
                if (s.scale <= 1) {
                    s.scale = 1;
                    s.translateX = 0;
                    s.translateY = 0;
                } else {
                    // 限制拖曳範圍
                    const imgW = img.offsetWidth;
                    const imgH = img.offsetHeight;
                    const containerW = viewer.clientWidth;
                    const containerH = viewer.clientHeight;
                    const scaledW = imgW * s.scale;
                    const scaledH = imgH * s.scale;
                    const maxTx = scaledW > containerW ? (scaledW - containerW) / 2 : 0;
                    const maxTy = scaledH > containerH ? (scaledH - containerH) / 2 : 0;
                    s.translateX = Math.max(-maxTx, Math.min(maxTx, s.translateX));
                    s.translateY = Math.max(-maxTy, Math.min(maxTy, s.translateY));
                }
                img.style.transform = `translate(${s.translateX}px, ${s.translateY}px) scale(${s.scale})`;
            }

            function resetSlideTransform(index) {
                slideStates[index] = { scale: 1, translateX: 0, translateY: 0 };
                const img = slides[index].querySelector('img');
                img.style.transform = 'translate(0px, 0px) scale(1)';
            }

            // --- 拖曳 ---
            viewer.addEventListener('mousedown', (e) => {
                if (e.target.closest('.ext3d-arrow') || e.target.closest('.ext3d-dot')) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const s = slideStates[currentIndex];
                s.translateX += e.clientX - startX;
                s.translateY += e.clientY - startY;
                startX = e.clientX;
                startY = e.clientY;
                updateSlideTransform(currentIndex);
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            // --- 滾輪縮放 ---
            viewer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const s = slideStates[currentIndex];
                const zoomIntensity = 0.1;
                const direction = e.deltaY < 0 ? 1 : -1;
                let newScale = s.scale * Math.exp(direction * zoomIntensity);
                if (newScale < MIN_SCALE) newScale = MIN_SCALE;
                if (newScale > MAX_SCALE) newScale = MAX_SCALE;

                const rect = viewer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - rect.width / 2;
                const mouseY = e.clientY - rect.top - rect.height / 2;
                const ratio = 1 - (newScale / s.scale);

                s.translateX += (mouseX - s.translateX) * ratio;
                s.translateY += (mouseY - s.translateY) * ratio;
                s.scale = newScale;
                updateSlideTransform(currentIndex);
            }, { passive: false });

            // --- 雙擊還原 ---
            viewer.addEventListener('dblclick', (e) => {
                if (e.target.closest('.ext3d-arrow') || e.target.closest('.ext3d-dot')) return;
                resetSlideTransform(currentIndex);
            });

        })();
    </script>
    <script src="js/spa-router.js"></script>
</body>

</html>
