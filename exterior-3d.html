<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.0.2">
    <script>
      if (!window.location.hostname.includes('localhost') && window.location.hostname !== '127.0.0.1') {
        document.write('<base href="/fuyu-academic-forest/">');
      }
    </script>
    <title>外觀3D - 富宇學森 The Academic Forest</title>
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5016">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="富宇學森">
    <link rel="apple-touch-icon" href="assets/images/fuyu-logo.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css?v=1.0.2">
    <link rel="stylesheet" href="css/global.css?v=1.0.2">
    <link rel="stylesheet" href="css/topbar.css?v=1.0.2">
    <link rel="stylesheet" href="css/exterior-3d.css?v=1.0.2">
    <!-- PWA Update Loading Screen -->
    <style id="pwa-loading-style">
      #pwa-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0A1F0A 0%, #1a3a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      #pwa-loading-overlay.hidden {
        pointer-events: none;
        opacity: 0;
      }
      .pwa-loading-content {
        text-align: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .pwa-loading-spinner {
        width: 60px;
        height: 60px;
        margin: 0 auto 20px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #2D5016;
        border-radius: 50%;
        animation: pwa-spin 1s linear infinite;
      }
      @keyframes pwa-spin {
        to { transform: rotate(360deg); }
      }
      .pwa-loading-text {
        font-size: 16px;
        font-weight: 500;
        color: #ccc;
      }
    </style>
</head>

<body class="pano-page">
    <!-- PWA Loading Overlay -->
    <div id="pwa-loading-overlay">
      <div class="pwa-loading-content">
        <div class="pwa-loading-spinner"></div>
        <div class="pwa-loading-text">正在檢查更新...</div>
      </div>
    </div>
    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- 全螢幕圖片檢視器 -->
    <div class="ext3d-viewer" id="ext3dViewer">

        <!-- 圖片輪播 -->
        <div class="ext3d-slide active" data-index="0">
            <img src="assets/images/3D-01.webp" alt="富宇學森 外觀3D透視圖 - 日景" draggable="false">
        </div>
        <div class="ext3d-slide" data-index="1">
            <img src="assets/images/3D-02.webp" alt="富宇學森 外觀3D透視圖 - 夜間光影" draggable="false">
        </div>

        <!-- 左右箭頭 -->
        <button class="ext3d-arrow ext3d-arrow-prev" id="prevBtn" title="上一張">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="ext3d-arrow ext3d-arrow-next" id="nextBtn" title="下一張">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>

        <!-- 底部導航 -->
        <div class="ext3d-bottom-bar">
            <div class="ext3d-dots" id="ext3dDots"></div>
        </div>

        <!-- 頁面標題 -->
        <div class="ext3d-title-overlay">
            <h2>外觀3D</h2>
            <p>EXTERIOR 3D RENDERING</p>
        </div>

        <!-- 計數器 -->
        <div class="ext3d-counter" id="ext3dCounter">1 / 2</div>

        <!-- 3D透視圖免責聲明 -->
        <div class="ext3d-disclaimer">本3D透視圖僅供參考，實際以建造變更核准圖面為準。</div>

        <!-- 操作提示 -->
        <div class="ext3d-hint">
            <span>提示</span>
            <span>滾輪縮放 · 拖曳移動 · 左右箭頭切換</span>
        </div>

    </div>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script>
        (() => {
            const viewer = document.getElementById('ext3dViewer');
            const slides = viewer.querySelectorAll('.ext3d-slide');
            const dotsContainer = document.getElementById('ext3dDots');
            const counter = document.getElementById('ext3dCounter');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const totalSlides = slides.length;

            let currentIndex = 0;

            // ===== 建立圓點導航 =====
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'ext3d-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            });

            function goToSlide(index) {
                // 切換圖片前，先重設目前圖片的縮放狀態
                resetSlideTransform(currentIndex);

                slides[currentIndex].classList.remove('active');
                dotsContainer.children[currentIndex].classList.remove('active');

                currentIndex = (index + totalSlides) % totalSlides;

                slides[currentIndex].classList.add('active');
                dotsContainer.children[currentIndex].classList.add('active');
                counter.textContent = `${currentIndex + 1} / ${totalSlides}`;

                // 確保新圖片的縮放也已重設
                resetSlideTransform(currentIndex);
            }

            prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
            nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

            // ===== 鍵盤左右箭頭 =====
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
                if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
            });

            // ===== 每張圖片獨立的縮放/拖曳 =====
            const slideStates = Array.from(slides).map(() => ({
                scale: 1, translateX: 0, translateY: 0
            }));
            const MIN_SCALE = 1;
            const MAX_SCALE = 8;

            let isDragging = false;
            let startX = 0, startY = 0;

            function updateSlideTransform(index) {
                const s = slideStates[index];
                const img = slides[index].querySelector('img');
                if (s.scale <= 1) {
                    s.scale = 1;
                    s.translateX = 0;
                    s.translateY = 0;
                } else {
                    // 限制範圍
                    const imgW = img.offsetWidth;
                    const imgH = img.offsetHeight;
                    const containerW = viewer.clientWidth;
                    const containerH = viewer.clientHeight;
                    const scaledW = imgW * s.scale;
                    const scaledH = imgH * s.scale;
                    const maxTx = scaledW > containerW ? (scaledW - containerW) / 2 : 0;
                    const maxTy = scaledH > containerH ? (scaledH - containerH) / 2 : 0;
                    s.translateX = Math.max(-maxTx, Math.min(maxTx, s.translateX));
                    s.translateY = Math.max(-maxTy, Math.min(maxTy, s.translateY));
                }
                img.style.transform = `translate(${s.translateX}px, ${s.translateY}px) scale(${s.scale})`;
            }

            function resetSlideTransform(index) {
                slideStates[index] = { scale: 1, translateX: 0, translateY: 0 };
                const img = slides[index].querySelector('img');
                img.style.transform = 'translate(0px, 0px) scale(1)';
            }

            // --- 拖曳 ---
            viewer.addEventListener('mousedown', (e) => {
                if (e.target.closest('.ext3d-arrow') || e.target.closest('.ext3d-dot')) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const s = slideStates[currentIndex];
                s.translateX += e.clientX - startX;
                s.translateY += e.clientY - startY;
                startX = e.clientX;
                startY = e.clientY;
                updateSlideTransform(currentIndex);
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            // --- 滾輪縮放 ---
            viewer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const s = slideStates[currentIndex];
                const zoomIntensity = 0.1;
                const direction = e.deltaY < 0 ? 1 : -1;
                let newScale = s.scale * Math.exp(direction * zoomIntensity);
                if (newScale < MIN_SCALE) newScale = MIN_SCALE;
                if (newScale > MAX_SCALE) newScale = MAX_SCALE;

                const rect = viewer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - rect.width / 2;
                const mouseY = e.clientY - rect.top - rect.height / 2;
                const ratio = 1 - (newScale / s.scale);

                s.translateX += (mouseX - s.translateX) * ratio;
                s.translateY += (mouseY - s.translateY) * ratio;
                s.scale = newScale;
                updateSlideTransform(currentIndex);
            }, { passive: false });

            // --- 雙擊還原 ---
            viewer.addEventListener('dblclick', (e) => {
                if (e.target.closest('.ext3d-arrow') || e.target.closest('.ext3d-dot')) return;
                resetSlideTransform(currentIndex);
            });

        })();
    </script>
    <script src="js/spa-router.js?v=1.0.2"></script>
    <!-- Asset Update Manager -->
    <script src="js/asset-update-manager.js"></script>
    <script src="js/pwa-register.js?v=1.0.2" defer></script>
</body>

</html>
