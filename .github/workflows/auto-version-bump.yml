name: Auto Version Bump

# 觸發條件：
# 1. 推送到 main 分支
# 2. 只監視 assets/ 目錄的變化（避免無限循環）
on:
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "!.assets-hash"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    name: Check Assets and Bump Version
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auto Version Update
        run: node scripts/auto-update-version.js

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet version.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and Push Version Update
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add version.json .assets-hash
          git commit -m "chore: auto bump version based on assets changes"
          git push origin main

      - name: Summary
        run: |
          echo "## ✅ 自動版本管理完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "### 檢測到資源變化" >> $GITHUB_STEP_SUMMARY
            echo "✓ version.json 已自動更新" >> $GITHUB_STEP_SUMMARY
            echo "✓ PWA 用戶將在下次打開應用時自動更新" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 資源無變化" >> $GITHUB_STEP_SUMMARY
            echo "✓ 版本號保持不變" >> $GITHUB_STEP_SUMMARY
          fi
