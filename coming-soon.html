<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即將推出 - 富宇學森 The Academic Forest</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/coming-soon.css">
</head>

<body>

    <!-- Top Bar -->
    <header class="topbar">
        <div class="topbar-logo">
            <a href="index.html">
                <span>富宇學森</span>
            </a>
        </div>
        <nav class="topbar-nav">
            <div class="nav-item">
                <a href="brand-fuyu.html" class="nav-link">品牌介紹</a>
                <div class="submenu">
                    <div class="submenu-item"><a href="brand-fuyu.html">富宇機構</a></div>
                    <div class="submenu-item"><a href="brand-team.html">建築團隊</a></div>
                </div>
            </div>
            <div class="nav-item">
                <a href="location.html" class="nav-link">地段環境</a>
            </div>
            <div class="nav-item">
                <a href="coming-soon.html?page=architecture" class="nav-link">建築規劃</a>
            </div>
            <div class="nav-item">
                <a href="coming-soon.html?page=materials" class="nav-link">建材設備</a>
            </div>
            <div class="nav-item">
                <a href="coming-soon.html?page=construction" class="nav-link">工法介紹</a>
            </div>
        </nav>
        <div class="topbar-actions">
            <button class="refresh-btn" onclick="location.reload()" title="重新整理">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="coming-soon-page">
        <div class="coming-soon-overlay"></div>
        <div class="coming-soon-content">
            <div class="cs-icon">🌿</div>
            <h1 class="cs-title">即將推出</h1>
            <div class="cs-en">COMING SOON</div>
            <h2 class="cs-subtitle" id="page-name-display">精彩內容籌備中</h2>
            <button class="cs-back-btn" onclick="window.history.back()">回前頁</button>
        </div>
    </main>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/fullscreen.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const pageName = params.get('page');
            const displayEl = document.getElementById('page-name-display');

            const titles = {
                'location': '地段環境',
                'architecture': '建築規劃',
                'materials': '建材設備',
                'construction': '工法介紹'
            };

            if (pageName && titles[pageName]) {
                displayEl.textContent = `— ${titles[pageName]} —`;
            }
        });
    </script>
    <script src="js/spa-router.js"></script>
</body>

</html>
