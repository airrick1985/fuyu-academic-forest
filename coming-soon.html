<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/fuyu-academic-forest/">
    <meta name="app-version" content="1.0.0">
    <title>即將推出 - 富宇學森 The Academic Forest</title>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2D5016">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="富宇學森">
    <link rel="apple-touch-icon" href="/assets/images/fuyu-logo.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/coming-soon.css">
</head>

<body>

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <main class="coming-soon-page">
        <div class="coming-soon-overlay"></div>
        <div class="coming-soon-content">
            <div class="cs-icon">🌿</div>
            <h1 class="cs-title">即將推出</h1>
            <div class="cs-en">COMING SOON</div>
            <h2 class="cs-subtitle" id="page-name-display">精彩內容籌備中</h2>
            <button class="cs-back-btn" onclick="window.history.back()">回前頁</button>
        </div>
    </main>

    <!-- JS -->
    <script src="js/topbar.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const pageName = params.get('page');
            const displayEl = document.getElementById('page-name-display');

            const titles = {
                'location': '地段環境',
                'architecture': '建築規劃',
                'materials': '建材設備',
                'construction': '工法介紹'
            };

            if (pageName && titles[pageName]) {
                displayEl.textContent = `— ${titles[pageName]} —`;
            }
        });
    </script>
    <script src="js/spa-router.js"></script>
    <script src="js/pwa-register.js" defer></script>
</body>

</html>
