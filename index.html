<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富宇學森 The Academic Forest - 建案電子銷售表板</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/hero.css">
</head>

<body>

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Background -->
        <div class="hero-bg">
            <img src="assets/images/hero-forest.webp" alt="Forest Background">
        </div>
        <div class="hero-overlay"></div>

        <!-- Fireflies Particles -->
        <div class="fireflies-canvas"></div>

        <!-- Content -->
        <div class="hero-content">
            <!-- 替換建案LOGO：將 data-logo-url 修改為您的 logo.png 或者 SVG 路徑即可生效特效 -->
            <div class="hero-logo" style="--logo-url: url('../assets/images/xuesen_logo.png');">
                <img src="assets/images/xuesen_logo.png" alt="富宇學森 LOGO">
                <div class="logo-shine-layer"></div>
            </div>
            <h2 class="hero-slogan">學境寓所．校園共森</h2>
        </div>

        <!-- 網頁首頁的 ANXI 膠囊按鈕 -->
        <a href="https://anxismart.com/#/" target="_blank" class="anxi-home-capsule" title="前往安熙智慧官網">
            <span>designed by ANXI</span>
        </a>
    </section>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/fireflies.js?v=2"></script>
    <script src="js/birds.js?v=2"></script>

    <script src="js/spa-router.js"></script>
</body>

</html>
