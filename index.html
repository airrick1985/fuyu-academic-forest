<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富宇學森 The Academic Forest - 建案銷售電子表版</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/hero.css">
</head>

<body>

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Background -->
        <div class="hero-bg">
            <img src="assets/images/hero-forest.webp" alt="Forest Background">
        </div>
        <div class="hero-overlay"></div>

        <!-- Fireflies Particles -->
        <div class="fireflies-canvas"></div>

        <!-- Content -->
        <div class="hero-content">
            <!-- 建案專屬 LOGO，data-logo-url 替換為建案的 logo.png 或 SVG 檔案即可套用 -->
            <div class="hero-logo" style="--logo-url: url('../assets/images/xuesen_logo.webp');">
                <img src="assets/images/xuesen_logo.webp" alt="富宇學森 LOGO">
                <div class="logo-shine-layer"></div>
            </div>
            <h2 class="hero-slogan">學區首選，富宇領航</h2>
        </div>

        <!-- 底部導航至 ANXI 官網 -->
        <a href="https://anxismart.com/#/" target="_blank" class="anxi-home-capsule" title="安熙智慧設計官網">
            <span>designed by ANXI</span>
        </a>
    </section>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/fireflies.js?v=2"></script>
    <script src="js/birds.js?v=2"></script>

    <script src="js/spa-router.js"></script>
</body>

</html>
