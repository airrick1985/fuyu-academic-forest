                    el.style.left = `${hs.x}%`;
                    el.style.top = `${hs.y}%`;

                        <div class="hotspot-ring"></div>
                        <div class="hotspot-ring-outer"></div>
                        <div class="hotspot-core"></div>
                        <span class="hotspot-label">${hs.label}</span>
                    `;

                        if (debugMode) return; // debug 模式下 click 不開 modal
                        e.stopPropagation();
                        openMaterialModal(hs);
                    });

                    blueprint.appendChild(el);
                });

            const debugToast = document.getElementById('matDebugToast');
            let dKeyPresses = [];
            const D_KEY_THRESHOLD = 5;      // 需要連按幾次
            const D_KEY_TIME_WINDOW = 2000; // 時間窗口 (ms)

            document.addEventListener('keydown', (e) => {
                // 如果正在輸入框內，不觸發
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                // 如果 Modal 開著且按 Escape，優先關閉 Modal（不進入此邏輯）
                if (e.key === 'Escape' && modalOverlay.classList.contains('active')) return;

                // Escape 退出 Debug 模式
                if (e.key === 'Escape' && debugMode) {
                    toggleDebugMode(false);
                    return;
                }

                // 偵測連按 D 鍵
                if (e.key === 'd' || e.key === 'D') {
                    const now = Date.now();
                    dKeyPresses.push(now);
                    // 只保留時間窗口內的按鍵記錄
                    dKeyPresses = dKeyPresses.filter(t => now - t < D_KEY_TIME_WINDOW);

                    if (dKeyPresses.length >= D_KEY_THRESHOLD) {
                        dKeyPresses = []; // 重置
                        toggleDebugMode(!debugMode);
                    }
                }
            });

            function toggleDebugMode(on) {
                debugMode = on;
                debugPanel.classList.toggle('active', debugMode);
                document.body.classList.toggle('mat-debug-mode', debugMode);
                updateDebugList();
                showDebugToast(debugMode ? '🔧 開發者模式 已啟用' : '🔒 開發者模式 已關閉');
            }

            function showDebugToast(msg) {
                debugToast.textContent = msg;
                debugToast.classList.add('show');
                clearTimeout(debugToast._timer);
                debugToast._timer = setTimeout(() => {
                    debugToast.classList.remove('show');
                }, 2500);
            }

            function updateDebugList() {
                debugList.innerHTML = '';
                hotspots.forEach(hs => {
                    const item = document.createElement('div');
                    item.className = 'mat-debug-item';
                    item.innerHTML = `
                        <span class="debug-name">${hs.label}</span>
                        <span class="debug-pos">x: ${hs.x.toFixed(1)}% y: ${hs.y.toFixed(1)}%</span>
                    `;
                    debugList.appendChild(item);
                });

            debugExport.addEventListener('click', () => {

                    id: hs.id,
                    label: hs.label,
                    x: parseFloat(hs.x.toFixed(1)),
                    y: parseFloat(hs.y.toFixed(1))
                }));
                const jsonStr = JSON.stringify(exportData, null, 2);
                navigator.clipboard.writeText(jsonStr).then(() => {
                    debugExport.textContent = '✅ 已複製！';
                    setTimeout(() => {
                        debugExport.textContent = '📋 匯出座標 (複製到剪貼簿)';
                    }, 2000);
                }).catch(() => {

                    prompt('請複製以下座標 JSON：', jsonStr);
                });
            });

            blueprint.addEventListener('mousedown', (e) => {
                if (!debugMode) return;
                const hotspot = e.target.closest('.mat-hotspot');
                if (!hotspot) return;
                e.preventDefault();
                dragTarget = hotspot;

                const rect = blueprint.getBoundingClientRect();
                const hsRect = hotspot.getBoundingClientRect();
                dragOffsetX = e.clientX - (hsRect.left + hsRect.width / 2);
                dragOffsetY = e.clientY - (hsRect.top + hsRect.height / 2);
            });

            window.addEventListener('mousemove', (e) => {
                if (!dragTarget) return;
                const rect = blueprint.getBoundingClientRect();
                // 使用實際圖片尺寸來計算百分比
                const imgRect = blueprintImg.getBoundingClientRect();

                const x = ((e.clientX - dragOffsetX - imgRect.left) / imgRect.width) * 100;
                const y = ((e.clientY - dragOffsetY - imgRect.top) / imgRect.height) * 100;

                const clampedX = Math.max(0, Math.min(100, x));
                const clampedY = Math.max(0, Math.min(100, y));

                dragTarget.style.left = `${clampedX}%`;
                dragTarget.style.top = `${clampedY}%`;

                // 更新資料
                const hsId = dragTarget.dataset.id;
                const hs = hotspots.find(h => h.id === hsId);
                if (hs) {
                    hs.x = clampedX;
                    hs.y = clampedY;
                }

                updateDebugList();
            });

                    name: 'Rinnai 玻璃雙口爐',
                    src: 'assets/images/equipment/瓦斯爐.webp',
                    desc: `<ul><li>日本專利內焰爐頭，火焰更集中</li><li>一級能效，省能高熱效</li><li>不銹鋼雙層湯盤，方便易清潔</li><li>輕量化鑄鐵爐架</li><li>熄火安全裝置</li></ul>`
                },
                {
                    name: 'Rinnai 懸掛式臭氧殺菌烘碗機',
                    src: 'assets/images/equipment/烘碗機.webp',
                    desc: `<ul><li>鏡面玻璃面板</li><li>快拆門板設計</li><li>抹布桿設計</li><li>開門斷電，門板開啟停止運轉</li><li>碗架加粗設計（材質：SUS#304）</li><li>機體下方加裝 LED 燈照明</li><li>隱藏式按鍵</li><li>一鍵啟動烘乾、臭氧抑菌</li></ul>`
                },
                {
                    name: 'BEST 電器收納櫃',
                    src: 'assets/images/equipment/電器收納櫃.webp',
                    desc: `<ul><li>美觀收納好方便，炊飯美味零時差</li><li>強力抽風扇，抽走蒸氣，完美靜音</li><li>抽盤式設計，方便電器使用</li><li>上掀門省空間，避免兒童撞傷</li><li>可同時放入電鍋與電子鍋，魔術大空間</li><li>收起琳瑯滿目的廚具，兼具美感與優雅的質感廚房</li></ul>`
                },
                {
                    name: 'Hansgrohe 廚房伸縮花灑龍頭',
                    src: 'assets/images/equipment/水龍頭.webp',
                    desc: `<ul><li>ComfortZone 150：150mm 龍頭空間，洗滌靈活不侷促</li><li>雙段出水模式：氣泡出水與花灑出水，按鍵鎖定，關閉自動復歸</li><li>sBox lite 專利收納：櫥櫃下方軟管收納箱，順暢安靜不糾結</li><li>50cm 抽拉長度：大幅延伸清潔範圍</li></ul>`
                },
                {
                    name: 'PRIMY 不鏽鋼水槽',
                    src: 'assets/images/equipment/水槽.webp',
                    desc: `<ul><li>不銹鋼毛絲面大單槽</li></ul>`
                }
            ];

            // ===== 建材 Modal =====
            function openMaterialModal(hs) {
                modalTitle.textContent = hs.label;
                modalSubtitle.textContent = hs.subtitle;

                // 過濾掉 grid 類型，只保留普通圖片
                currentGalleryImages = (hs.images || []).filter(img => img.type !== 'grid');
                currentGalleryIndex = 0;
                renderGallery();

                // 初次開啟，載入第一張圖片的 HTML
                if (currentGalleryImages.length > 0) {
                    renderTextForImage(currentGalleryImages[0]);
                } else {
                    modalDesc.innerHTML = '<p style="color: #999; text-align: center;">介紹內容準備中，敬請期待。</p>';
                }

                // 如果是廚房，在文字區下方加入「廚房設備一覽」按鈕
                if (hs.id === 'kitchen') {
                    const btnHtml = `
                        <div style="margin-top: 32px; text-align: center;">
                            <button class="equip-grid-btn" onclick="document.getElementById('equipGridOverlay').classList.add('active')">
                                ▶ 廚房設備一覽
                            </button>
                        </div>
                    `;
                    modalDesc.innerHTML += btnHtml;
                }

                // 顯示 Modal
                modalOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function renderTextForImage(imgObj) {
                if (imgObj && imgObj.html && imgObj.html.trim()) {
                    modalDesc.innerHTML = imgObj.html;
                } else {
                    modalDesc.innerHTML = ''; // 如果沒有文字設定則留白
                }
            }

            function renderGallery() {
                // 清除舊圖
                modalGallery.innerHTML = '';
                galleryDots.innerHTML = '';

                if (currentGalleryImages.length === 0) {
                    modalGallery.style.display = 'none';
                    galleryDots.style.display = 'none';
                    modalLeft.classList.add('single-image');
                    return;
                }

                modalGallery.style.display = 'block';
                galleryDots.style.display = 'flex';

                // 單張圖判定
                if (currentGalleryImages.length === 1) {
                    modalLeft.classList.add('single-image');
                    galleryDots.classList.add('single-image');
                } else {
                    modalLeft.classList.remove('single-image');
                    galleryDots.classList.remove('single-image');
                }

                currentGalleryImages.forEach((imgObj, idx) => {
                    const img = document.createElement('img');
                    img.src = imgObj.src || imgObj;
                    img.alt = `建材圖片 ${idx + 1}`;
                    img.draggable = false;
                    if (idx === 0) img.classList.add('active');
                    modalGallery.appendChild(img);

                    const dot = document.createElement('button');
                    dot.className = 'mat-gallery-dot' + (idx === 0 ? ' active' : '');
                    dot.addEventListener('click', () => goToSlide(idx));
                    galleryDots.appendChild(dot);
                });
            }

            function goToSlide(idx) {
                if (currentGalleryImages.length === 0) return;
                if (currentGalleryIndex === idx) return;
                currentGalleryIndex = idx;

                const allSlides = modalGallery.querySelectorAll(':scope > img');
                const dots = galleryDots.querySelectorAll('.mat-gallery-dot');
                allSlides.forEach((img, i) => img.classList.toggle('active', i === idx));
                dots.forEach((dot, i) => dot.classList.toggle('active', i === idx));

                // 重置縮放
                resetImgZoom();

                // 動態渲染這張圖片對應的 HTML 文本
                renderTextForImage(currentGalleryImages[idx]);

                // 如果是廚房，每次切換圖片都重新插入按鈕
                const currentHsId = modalTitle.textContent;
                // 檢查是否為廚房點位
                const kitchenHs = hotspots.find(h => h.id === 'kitchen');
                if (kitchenHs && modalTitle.textContent === kitchenHs.label) {
                    const existingBtn = modalDesc.querySelector('.equip-grid-btn');
                    if (!existingBtn) {
                        modalDesc.innerHTML += `
                            <div style="margin-top: 32px; text-align: center;">
                                <button class="equip-grid-btn" onclick="document.getElementById('equipGridOverlay').classList.add('active')">
                                    ▶ 廚房設備一覽
                                </button>
                            </div>
                        `;
                    }
                }
            }

            galleryPrev.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentGalleryImages.length <= 1) return;
                const newIdx = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
                goToSlide(newIdx);
            });

            galleryNext.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentGalleryImages.length <= 1) return;
                const newIdx = (currentGalleryIndex + 1) % currentGalleryImages.length;
                goToSlide(newIdx);
            });

            // 關閉 Modal
            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
                resetImgZoom();
            }

            // ===== 設備 Grid 覆蓋層邏輯 =====
            const equipGridOverlay = document.getElementById('equipGridOverlay');
            const equipGridClose = document.getElementById('equipGridClose');
            const equipGridContainer = document.getElementById('equipGridContainer');

            // 初始化設備 Grid
            kitchenEquipments.forEach(item => {
                const card = document.createElement('div');
                card.className = 'equip-card';
                card.innerHTML = `
                    <div class="equip-card-img-wrap">
                        <img src="${item.src}" alt="${item.name}" draggable="false">
                    </div>
                    <p class="equip-card-name">${item.name}</p>
                `;
                card.addEventListener('click', () => openEquipLightbox(item));
                equipGridContainer.appendChild(card);
            });

            equipGridClose.addEventListener('click', () => {
                equipGridOverlay.classList.remove('active');
            });
            equipGridOverlay.addEventListener('click', (e) => {
                if (e.target === equipGridOverlay) equipGridOverlay.classList.remove('active');
            });

            // ===== 設備燈箱邏輯 =====
            const equipOverlay = document.getElementById('equipLightboxOverlay');
            const equipClose = document.getElementById('equipLightboxClose');
            const equipImg = document.getElementById('equipLightboxImg');
            const equipName = document.getElementById('equipLightboxName');
            const equipDesc = document.getElementById('equipLightboxDesc');

            function openEquipLightbox(item) {
                equipImg.src = item.src;
                equipName.textContent = item.name;
                equipDesc.innerHTML = item.desc || '';
                equipOverlay.classList.add('active');
            }

            function closeEquipLightbox() {
                equipOverlay.classList.remove('active');
            }

            equipClose.addEventListener('click', closeEquipLightbox);
            equipOverlay.addEventListener('click', (e) => {
                if (e.target === equipOverlay) closeEquipLightbox();
            });

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (equipOverlay.classList.contains('active')) {
                        closeEquipLightbox();
                    } else if (equipGridOverlay.classList.contains('active')) {
                        equipGridOverlay.classList.remove('active');
                    } else if (modalOverlay.classList.contains('active')) {
                        closeModal();
                    }
                }
            });

            // ===== 圖片縮放與拖曳邏輯 =====
            let imgZoom = 1;
            let imgPanX = 0;
            let imgPanY = 0;
            let isImgPanning = false;
            let startImgX = 0;
            let startImgY = 0;

            function resetImgZoom() {
                imgZoom = 1;
                imgPanX = 0;
                imgPanY = 0;
                applyImgTransform();
            }

            function applyImgTransform() {
                const images = modalGallery.querySelectorAll('img');
                images.forEach(img => {
                    if (img.classList.contains('active')) {
                        img.style.transform = `translate(${imgPanX}px, ${imgPanY}px) scale(${imgZoom})`;
                        img.style.cursor = imgZoom > 1 ? 'grab' : 'default';
                        img.style.zIndex = '5'; // 拖曳時提高 z-index 避免被箭頭覆蓋
                        img.style.transition = isImgPanning ? 'none' : 'transform 0.1s ease-out'; // 拖曳時無延遲
                    } else {
                        img.style.transform = 'translate(0, 0) scale(1)';
                        img.style.cursor = 'default';
                        img.style.zIndex = '1';
                    }
                });
            }

            modalGallery.addEventListener('wheel', (e) => {
                const activeImg = modalGallery.querySelector('img.active');
                if (!activeImg) return;
                e.preventDefault();

                const zoomFactor = 0.15;
                if (e.deltaY < 0) imgZoom += zoomFactor;
                else imgZoom -= zoomFactor;

                imgZoom = Math.min(Math.max(1, imgZoom), 5); // 限制縮放比例 1x ~ 5x
                if (imgZoom === 1) {
                    imgPanX = 0;
                    imgPanY = 0;
                }
                applyImgTransform();
            });

            modalGallery.addEventListener('mousedown', (e) => {
                if (imgZoom <= 1) return;
                e.preventDefault(); // 防止瀏覽器原生拖曳或文字選取干擾
                isImgPanning = true;
                startImgX = e.clientX - imgPanX;
                startImgY = e.clientY - imgPanY;
                const activeImg = modalGallery.querySelector('img.active');
                if (activeImg) activeImg.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isImgPanning) return;
                imgPanX = e.clientX - startImgX;
                imgPanY = e.clientY - startImgY;
                applyImgTransform();
            });

            window.addEventListener('mouseup', () => {
                isImgPanning = false;
                applyImgTransform();
            });

            // ===== 初始化 =====
            createHotspots();
        })();
    </script>
    <script src="js/spa-router.js"></script>
