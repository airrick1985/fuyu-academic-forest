<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建築團隊 - 富宇學森 The Academic Forest</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/brand.css">
</head>

<body class="brand-page">

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- Content -->
    <main class="brand-content container">
        <div class="page-header fade-in">
            <h1 class="page-title">極致匠心</h1>
            <div class="page-subtitle">ARCHITECTURE TEAM</div>
        </div>

        <!-- 建築設計 -->
        <section class="section fade-in">
            <div class="team-member">
                <img src="assets/images/architect-01.jpg" alt="建築外觀" class="team-image-placeholder"
                    style="object-fit: cover; border: none;">
                <div class="team-info">
                    <div class="team-role">建築設計 ARCHITECTURE DESIGN</div>
                    <h2 class="team-name">吳六合建築師事務所</h2>
                    <p class="team-desc">
                        以深厚的美學底蘊，演繹現代建築語彙。吳六合建築師團隊專注於如何讓建築與周遭環境對話，將光影、風向、與自然的節奏寫入空間，不僅雕塑城市天際線，更創造出雋永的高端居住品質。
                    </p>
                </div>
            </div>
        </section>

        <!-- 景觀公設 -->
        <section class="section fade-in">
            <div class="team-member">
                <img src="assets/images/architect-02.jpg" alt="景觀公設" class="team-image-placeholder"
                    style="object-fit: cover; border: none;">
                <div class="team-info">
                    <div class="team-role">景觀公設 LANDSCAPE & INTERIOR</div>
                    <h2 class="team-name">蘇煜淳建築師事務所</h2>
                    <p class="team-desc">
                        融合自然景觀與室內美學，蘇煜淳團隊擅長將森林的療癒感引入公眾空間。以流暢的動線與精緻的材質搭配，創造出靜謐而奢華的公設體驗，讓住戶在每一次回家都能感受到度假般的放鬆與沉澱。
                    </p>
                </div>
            </div>
        </section>

        <!-- 燈光設計 -->

    </main>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/animations.js"></script>

    <script src="js/spa-router.js"></script>
</body>

</html>
