<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.0.0">
    <script>
      if (!window.location.hostname.includes('localhost') && window.location.hostname !== '127.0.0.1') {
        document.write('<base href="/fuyu-academic-forest/">');
      }
    </script>
    <title>建築團隊 - 富宇學森 The Academic Forest</title>
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5016">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="富宇學森">
    <link rel="apple-touch-icon" href="assets/images/fuyu-logo.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/brand.css">
</head>

<body class="brand-page">

    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <!-- Content -->
    <main class="brand-content container">
        <div class="page-header fade-in">
            <h1 class="page-title">建築團隊</h1>
            <div class="page-subtitle">ARCHITECTURE TEAM</div>
        </div>

        <!-- 建築設計 -->
        <section class="section fade-in">
            <div class="team-member">
                <img src="assets/images/architect-01.webp" alt="建築外觀" class="team-image-placeholder"
                    style="object-fit: cover; border: none;">
                <div class="team-info">
                    <div class="team-role">建築設計 ARCHITECTURE DESIGN</div>
                    <h2 class="team-name">吳六合建築師事務所</h2>
                    <p class="team-desc">
                        吳六合建築師具備深厚實務經驗，領導「吳六合建築師事務所」深耕台灣多年。設計核心強調建築與環境的諧調共生，擅長平衡空間美學、機能需求與專業法規。憑藉嚴謹執行力與豐富的住宅、商辦實績，致力為客戶創造具備永續價值與人文溫度的建築空間。
                    </p>
                </div>
            </div>
        </section>

        <!-- 景觀與室內設計 -->
        <section class="section fade-in">
            <div class="team-member">
                <img src="assets/images/architect-02.webp" alt="景觀與室內設計" class="team-image-placeholder"
                    style="object-fit: cover; border: none;">
                <div class="team-info">
                    <div class="team-role">景觀與室內設計 LANDSCAPE & INTERIOR</div>
                    <h2 class="team-name">蘇煜淳建築師事務所</h2>
                    <p class="team-desc">
                        擅長景觀與室內空間的整合規劃，以精緻典雅的設計風格著稱，從公設規劃到私領域的室內配置，每一處細節都展現對美感的堅持，為住戶打造舒適愜意的居家環境。
                    </p>
                </div>
            </div>
        </section>

        <!-- 更多團隊 -->

    </main>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/animations.js"></script>

    <script src="js/spa-router.js"></script>
    <!-- Asset Update Manager -->
    <script src="js/asset-update-manager.js"></script>
    <script src="js/pwa-register.js" defer></script>
</body>

</html>
