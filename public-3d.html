<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.0.0">
    <script>
      if (!window.location.hostname.includes('localhost') && window.location.hostname !== '127.0.0.1') {
        document.write('<base href="/fuyu-academic-forest/">');
      }
    </script>
    <title>公設3D - 富宇學森 The Academic Forest</title>
    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2D5016">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="富宇學森">
    <link rel="apple-touch-icon" href="assets/images/fuyu-logo.webp">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css?v=1.0">
    <link rel="stylesheet" href="css/global.css?v=1.0">
    <link rel="stylesheet" href="css/topbar.css?v=1.0">
    <link rel="stylesheet" href="css/coming-soon.css?v=1.0">
    <!-- PWA Update Loading Screen -->
    <style id="pwa-loading-style">
      #pwa-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #0A1F0A 0%, #1a3a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      #pwa-loading-overlay.hidden {
        pointer-events: none;
        opacity: 0;
      }
      .pwa-loading-content {
        text-align: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .pwa-loading-spinner {
        width: 60px;
        height: 60px;
        margin: 0 auto 20px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #2D5016;
        border-radius: 50%;
        animation: pwa-spin 1s linear infinite;
      }
      @keyframes pwa-spin {
        to { transform: rotate(360deg); }
      }
      .pwa-loading-text {
        font-size: 16px;
        font-weight: 500;
        color: #ccc;
      }
    </style>
</head>

<body>
    <!-- PWA Loading Overlay -->
    <div id="pwa-loading-overlay">
      <div class="pwa-loading-content">
        <div class="pwa-loading-spinner"></div>
        <div class="pwa-loading-text">正在檢查更新...</div>
      </div>
    </div>
    <!-- Top Bar (由 topbar.js 統一注入) -->
    <div id="topbar-root"></div>

    <main class="coming-soon-page">
        <div class="coming-soon-overlay"></div>
        <div class="coming-soon-content">
            <div class="cs-icon">🏢</div>
            <h1 class="cs-title">公設3D</h1>
            <div class="cs-en">PUBLIC FACILITIES 3D</div>
            <h2 class="cs-subtitle">精彩內容籌備中</h2>
            <button class="cs-back-btn" onclick="window.history.back()">回前頁</button>
        </div>
    </main>

    <!-- JS -->
    <script src="js/topbar.js"></script>
    <script src="js/spa-router.js?v=1.0"></script>
    <script src="js/pwa-register.js?v=1.0" defer></script>
</body>

</html>
